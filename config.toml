[logging]
level = "info"
directory = "./logs"

[finch]
# Product-specific config goes here.

[ai]
enabled = true
provider = "ollama"
model = "qwen3:14b-q4_K_M"
# Not speed-constrained here — err toward too much context room rather than
# too little. Truncated context is a common cause of a model "forgetting" it
# has a tool, especially with day-trading OHLCV series eating tokens fast.
num_ctx = 40960
# Low temperature for tool-call steps: reduces variance in whether the model
# calls a tool vs. answers from memory.
temperature = 0.2
# Extended thinking mode — improves tool-selection accuracy on multi-tool
# scenarios (the opposite tradeoff from optimizing for speed).
think = true

[database]
# PostgreSQL connection URL. The environment variable DATABASE_URL takes precedence
# when using PostgresDataModule::from_env.
url = "postgresql://postgres:postgres@192.168.88.10/finch"
